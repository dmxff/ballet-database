name: Update Hamburg Ballett database

# Runs every day at 03:00 UTC, and can also be triggered manually from the
# "Actions" tab in GitHub for on-demand refreshes.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write # needed so the workflow can commit the updated JSON back

jobs:
  scrape:
    name: Scrape official Hamburg Ballett site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (and Playwright Chromium)
        run: npm install

      - name: Run scraper
        run: npm run fetch

      - name: Commit and push changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if the scraper actually changed the data file.
          if ! git diff --quiet -- database/events/hamburg.json; then
            git add database/events/hamburg.json
            git commit -m "chore: update hamburg.json [automated daily scrape]"
            git push
          else
            echo "No changes to database/events/hamburg.json — nothing to commit."
          fi
